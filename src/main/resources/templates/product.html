<!DOCTYPE html>
<html>
<head>
<title>Product Details</title>

<style>
body {
    font-family: Arial;
    padding: 40px;
}

.container {
    display: flex;
    gap: 40px;
}

img {
    width: 200px;
}

button {
    padding: 10px;
    margin-right: 10px;
}
</style>
</head>

<body>

<h2>Item description and buy option:</h2>

<div class="container">

    <img src="img1.jpg">

    <div>
        <h3 th:text="${name}"></h3>
        <p th:text="${desc}"></p>
        <h4>₹<span th:text="${price}"></span></h4>

        <!-- ADD TO CART -->
        <form action="/addToCart">
            <input type="hidden" name="name" th:value="${name}">
            <input type="hidden" name="price" th:value="${price}">
            <button type="submit">Add to Cart</button>
        </form>

        <!-- BUY NOW -->
        <form action="/buyNow">
            <input type="hidden" name="name" th:value="${name}">
            <input type="hidden" name="price" th:value="${price}">
            <button type="submit">Buy Now</button>
        </form>
    </div>

</div>

<br><br>

<h4>Product Description</h4>
<p th:text="${desc}"></p>

</body>
</html>
