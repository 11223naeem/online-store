<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Bank Login</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
:root {
    --primary: linear-gradient(135deg, #667eea, #764ba2);
    --accent: #667eea;
    --text: #333;
}

body {
    margin: 0;
    font-family: "Segoe UI", sans-serif;
    height: 100vh;
    background: var(--primary);
    display: flex;
    justify-content: center;
    align-items: center;
}

/* Glass Card */
.login-card {
    background: rgba(255, 255, 255, 0.15);
    backdrop-filter: blur(15px);
    padding: 40px;
    border-radius: 20px;
    width: 320px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    text-align: center;
    color: #fff;
}

/* Title */
.login-card h2 {
    margin-bottom: 25px;
}

/* Input */
.login-card input {
    width: 100%;
    padding: 12px;
    border: none;
    border-radius: 10px;
    margin-bottom: 15px;
    outline: none;
}

/* Button */
.login-btn {
    width: 100%;
    padding: 12px;
    border: none;
    border-radius: 30px;
    background: #fff;
    color: #667eea;
    font-weight: bold;
    cursor: pointer;
    transition: 0.3s;
}

.login-btn:hover {
    transform: scale(1.05);
}

/* Create Account Button */
.create-btn {
    display: block;
    margin-top: 15px;
    padding: 10px;
    border-radius: 30px;
    background: transparent;
    border: 1px solid #fff;
    color: #fff;
    text-decoration: none;
    transition: 0.3s;
}

.create-btn:hover {
    background: #fff;
    color: #667eea;
}

/* Error */
.error {
    color: #ffdddd;
    font-size: 0.9rem;
    margin-bottom: 10px;
}
</style>
</head>

<body>

<div class="login-card">
    <h2> Login</h2>

    <!-- Error message -->
    <p class="error" th:text="${error}"></p>

    <form action="/loginAccounts">
        <input type="text" name="name" placeholder="User Name" required>
		<input type="text" name="pass" placeholder="Password" required>
        <button type="submit" class="login-btn">Login</button>
    </form>
	
	

    <a href="/createAccount" class="create-btn">Create New Account</a>
</div>

</body>
</html>
